# ==============================================================
# CHAT-SERVICE CONFIGURATION
# ==============================================================
# Port 8084 — theo thứ tự: Identity(8080), Product(8081),
# Rental(8082), Review(8083), Chat(8084)
# ==============================================================

server:
  port: 8084

spring:
  application:
    name: Chat-service

  # ============================================
  # DATABASE — MySQL trên port 3310
  # ============================================
  datasource:
    url: jdbc:mysql://localhost:3310/chat_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # ============================================
  # SECURITY — Tắt auto-config basic auth
  # ============================================
  security:
    user:
      name: hoangluc
      password: 1234567

# ==============================================================
# JWT — Khóa bí mật dùng chung toàn hệ thống
# ==============================================================
# PHẢI trùng khớp với jwt.signerKey trong Identity-service
# Thuật toán: HMAC-SHA512 (HS512)
# ==============================================================
jwt:
  signerKey: "_G8QMpPL2NdilojwwGVfLjMfUvkn_6fBMUZ30WYQAtA1234567890abcdefghijklm"

# ==============================================================
# LOGGING — Chỉ log INFO cho production
# ==============================================================
logging:
  level:
    com.rentmarket.chat_service: INFO
    org.springframework.web.socket: WARN
    org.springframework.messaging: WARN
